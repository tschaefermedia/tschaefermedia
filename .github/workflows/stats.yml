name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"   # Daily at 2am CET
  workflow_dispatch:        # Allow manual trigger

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─── Card 1: Header + Isometric Contribution Calendar ───────────────────
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: tschaefermedia
          template: classic
          base: header
          base_indepth: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Berlin
          config_padding: 10
          output_action: commit
          committer_message: "chore: update metrics [skip ci]"

      # ─── Card 2: Languages Breakdown ─────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          user: tschaefermedia
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_ignored: html, css, blade, twig, scss, less, makefile, dockerfile
          config_timezone: Europe/Berlin
          output_action: commit
          committer_message: "chore: update metrics [skip ci]"

      # ─── Card 3: Recent Activity ─────────────────────────────────────────────
      - name: Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.activity.svg
          user: tschaefermedia
          template: classic
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, release, issue
          config_timezone: Europe/Berlin
          output_action: commit
          committer_message: "chore: update metrics [skip ci]"
